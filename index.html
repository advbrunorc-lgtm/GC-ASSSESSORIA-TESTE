<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LP Assessoria Prev</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111827">

  <style>
    body{font-family:system-ui,Arial;margin:16px;max-width:980px}
    .card{border:1px solid #ddd;border-radius:14px;padding:14px;margin:12px 0}
    label{display:block;font-weight:700;margin-top:10px}
    input,select,textarea{width:100%;padding:10px;margin-top:6px;border:1px solid #ccc;border-radius:12px;font-size:16px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:720px){.row{grid-template-columns:1fr}}
    button{padding:12px 14px;border:0;border-radius:12px;cursor:pointer;font-weight:800;background:#111827;color:#fff;margin-top:12px;width:100%}
    .btn2{background:#0a7b34}
    .muted{color:#555;font-size:14px}
    #status{margin-top:10px;font-weight:800}
    .box{background:#f7f7f7;border:1px solid #e1e1e1;border-radius:12px;padding:12px;margin-top:10px}
    .k{font-weight:800}
  </style>
</head>
<body>
  <h1>LP Assessoria Prev</h1>
  <p class="muted">Gera <b>Contrato</b> e <b>Procuração</b> em PDF no Drive + registra dados na planilha.</p>

  <div class="card">
    <h2>Dados do Cliente (Documentos)</h2>

    <label>Nome completo *</label>
    <input id="clienteNome" autocomplete="name" required>

    <div class="row">
      <div>
        <label>CPF *</label>
        <input id="clienteCpf" inputmode="numeric" placeholder="Pode digitar com pontos/traço" required>
      </div>
      <div>
        <label>RG (opcional)</label>
        <input id="clienteRg">
      </div>
    </div>

    <div class="row">
      <div>
        <label>Nacionalidade *</label>
        <input id="clienteNacionalidade" value="Brasileira" required>
      </div>
      <div>
        <label>Profissão (opcional)</label>
        <input id="clienteProfissao">
      </div>
    </div>

    <label>Estado civil (opcional)</label>
    <select id="clienteEstadoCivil">
      <option value="">Selecione...</option>
      <option>SOLTEIRO(A)</option>
      <option>CASADO(A)</option>
      <option>VIÚVO(A)</option>
      <option>CONVIVE EM UNIÃO ESTÁVEL</option>
      <option>DIVORCIADO(A)</option>
    </select>

    <label>Endereço completo *</label>
    <textarea id="clienteEndereco" rows="3" required></textarea>

    <label>UF (Estado) *</label>
    <select id="clienteUF" required>
      <option value="MT" selected>MT</option>
      <option value="GO">GO</option>
      <option>AC</option><option>AL</option><option>AP</option><option>AM</option><option>BA</option>
      <option>CE</option><option>DF</option><option>ES</option><option>MA</option><option>MS</option>
      <option>MG</option><option>PA</option><option>PB</option><option>PR</option><option>PE</option>
      <option>PI</option><option>RJ</option><option>RN</option><option>RS</option><option>RO</option>
      <option>RR</option><option>SC</option><option>SP</option><option>SE</option><option>TO</option>
    </select>
  </div>

  <div class="card">
    <h2>Controle interno (Planilha)</h2>

    <div class="row">
      <div>
        <label>Telefone do cliente *</label>
        <input id="clienteTelefone" inputmode="tel" placeholder="(65) 9xxxx-xxxx" required>
      </div>
      <div>
        <label>Senha GOV *</label>
        <input id="govSenha" type="password" required>
      </div>
    </div>

    <div class="row">
      <div>
        <label>Está trabalhando?</label>
        <select id="estaTrabalhando">
          <option value="">Selecione...</option>
          <option value="SIM">SIM</option>
          <option value="NÃO">NÃO</option>
        </select>
      </div>
      <div>
        <label>Tem qualidade de segurado?</label>
        <select id="qualidadeSegurado">
          <option value="">Selecione...</option>
          <option value="SIM">SIM</option>
          <option value="NÃO">NÃO</option>
          <option value="NÃO SEI / A APURAR">NÃO SEI / A APURAR</option>
        </select>
      </div>
    </div>

    <label>Especialidade médica / Doença</label>
    <select id="especialidadeMedica">
      <option value="">Selecione...</option>
      <option value="NEUROLÓGICA">NEUROLÓGICA</option>
      <option value="PSIQUIÁTRICA">PSIQUIÁTRICA</option>
      <option value="ORTOPÉDICA">ORTOPÉDICA</option>
      <option value="CÂNCER">CÂNCER</option>
      <option value="DOENÇA DEGENERATIVA">DOENÇA DEGENERATIVA</option>
      <option value="VISUAL">VISUAL</option>
      <option value="AUTOIMUNE">AUTOIMUNE</option>
      <option value="OUTRA">OUTRA</option>
    </select>

    <label>Detalhe/observação da doença (opcional)</label>
    <textarea id="doencaObservacao" rows="2"></textarea>

    <div class="row">
      <div>
        <label>Possui laudo/atestado médico?</label>
        <select id="possuiLaudo">
          <option value="">Selecione...</option>
          <option value="SIM">SIM</option>
          <option value="NÃO">NÃO</option>
        </select>
      </div>
      <div>
        <label>Se SIM, tempo do laudo</label>
        <select id="tempoLaudo">
          <option value="">Selecione...</option>
          <option value="PERMANENTE">PERMANENTE</option>
          <option value="10 DIAS">10 DIAS</option>
          <option value="20 DIAS">20 DIAS</option>
          <option value="30 DIAS">30 DIAS</option>
          <option value="60 DIAS">60 DIAS</option>
          <option value="90 DIAS">90 DIAS</option>
          <option value="120 DIAS">120 DIAS</option>
          <option value="180 DIAS">180 DIAS</option>
          <option value="OUTRO">OUTRO</option>
        </select>
      </div>
    </div>

    <label>Se NÃO tem laudo, cliente vai pagar o laudo?</label>
    <select id="vaiPagarLaudo">
      <option value="">Selecione...</option>
      <option value="SIM">SIM</option>
      <option value="NÃO">NÃO</option>
    </select>
  </div>

  <div class="card">
    <h2>Contrato / Procuração</h2>

    <label>Tipo de benefício *</label>
    <select id="beneficio" required>
      <option value="">Selecione...</option>
      <option>Benefício por incapacidade temporária</option>
      <option>Incapacidade permanente</option>
      <option>Aposentadoria</option>
      <option>Auxílio-acidente</option>
      <option>Pensão por morte</option>
      <option>BPC</option>
      <option>Salário-maternidade</option>
    </select>

    <div id="camposHonorarios"></div>

    <div class="row">
      <div>
        <label>Assinatura a rogo?</label>
        <select id="assinaturaARogo">
          <option value="NÃO" selected>NÃO</option>
          <option value="SIM">SIM</option>
        </select>
      </div>
      <div></div>
    </div>

    <div class="row">
      <div>
        <label>Local *</label>
        <input id="local" value="Várzea Grande/MT" required>
      </div>
      <div>
        <label>Data *</label>
        <input id="data" type="date" required>
      </div>
    </div>

    <button id="btnGerar">GERAR PDFs E SALVAR</button>
    <button id="btnAbrirPasta" class="btn2" type="button">ABRIR PASTA DESTE CLIENTE</button>

    <div id="status"></div>
  </div>

  <div class="card">
    <h2>Buscar cliente por CPF</h2>
    <label>CPF para buscar</label>
    <input id="cpfBusca" inputmode="numeric" placeholder="Digite o CPF">
    <button id="btnBuscar" type="button">BUSCAR</button>
    <div id="resultadoBusca" class="box" style="display:none"></div>
    <button id="btnAbrirPastaBusca" class="btn2" type="button" style="display:none">ABRIR PASTA DO CLIENTE ENCONTRADO</button>
  </div>

<script>
  // ✅ SUA URL NOVA
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxqUrs3u5v_ieu7FE_2AydzLS6AV9_8Jkm5hBKiHlMiAmlZ2nMrFr416zJZ38VgaMNR/exec";
  const TOKEN = "BRUNO-SEGURANCA-2026";

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
  }

  function $(id){ return document.getElementById(id); }
  function onlyDigits(s){ return String(s||"").replace(/\D+/g,""); }

  function regra(b){
    b=(b||"").toLowerCase();
    if (b.includes("incapacidade tempor")) return "REGRA_1";
    if (b.includes("salário") || b.includes("matern")) return "REGRA_3";
    return "REGRA_2";
  }

  function todayISO(){
    const d=new Date(); const p=n=>String(n).padStart(2,"0");
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
  }
  function brDateFromISO(iso){
    const [y,m,d]=String(iso||"").split("-");
    return `${d}/${m}/${y}`;
  }
  function setStatus(msg, ok){
    const el=$("status");
    el.style.color = ok ? "#0a7b34" : "#b00020";
    el.textContent = msg;
  }
  function valReq(id, label){
    const v = ($(id).value || "").trim();
    if(!v) throw new Error("Preencha: " + label);
    return v;
  }

  function renderHonorarios(){
    const b = $("beneficio").value;
    const box = $("camposHonorarios");
    if(!b){ box.innerHTML=""; return; }

    const r = regra(b);

    if(r==="REGRA_1"){
      box.innerHTML = `
        <h3>Honorários (Incapacidade Temporária)</h3>
        <div class="row">
          <div><label>% inicial *</label><input id="percInicial" type="number" value="30" required></div>
          <div><label>Nº parcelas iniciais *</label><input id="numParcelasIniciais" type="number" value="8" required></div>
        </div>
        <label>% prorrogação *</label>
        <input id="percProrrogacao" type="number" value="30" required>
        <p class="muted">Prorrogação: cobrança intercalada (automática).</p>
      `;
      return;
    }

    if(r==="REGRA_3"){
      box.innerHTML = `
        <h3>Honorários (Salário-maternidade)</h3>
        <div class="row">
          <div><label>% *</label><input id="percMaternidade" type="number" value="30" required></div>
          <div><label>Nº parcelas *</label><input id="numParcelasMaternidade" type="number" value="4" required></div>
        </div>
      `;
      return;
    }

    box.innerHTML = `
      <h3>Honorários (Aposentadorias / Permanente / Auxílio-acidente / Pensão / BPC)</h3>
      <div class="row">
        <div><label>% sobre retroativo *</label><input id="percRetroativo" type="number" value="45" required></div>
        <div><label>Nº primeiras parcelas integrais *</label><input id="numPrimeirasParcelasIntegrais" type="number" value="6" required></div>
      </div>

      <label>Parcelamento das parcelas integrais?</label>
      <select id="parcelamentoAtivado">
        <option value="false" selected>NÃO</option>
        <option value="true">SIM</option>
      </select>

      <div id="parcelamentoBox"></div>
    `;

    $("parcelamentoAtivado").addEventListener("change", renderParcelamento);
    renderParcelamento();
  }

  function renderParcelamento(){
    const on = $("parcelamentoAtivado").value === "true";
    const box = $("parcelamentoBox");
    if(!on){ box.innerHTML=""; return; }
    box.innerHTML = `
      <div class="row">
        <div><label>Nº máximo de parcelas *</label><input id="maxParcelasPagamento" type="number" value="12" required></div>
        <div><label>% mínimo de cada parcela *</label><input id="percMinimoParcela" type="number" value="50" required></div>
      </div>
    `;
  }

  function abrirPastaPorCpf(cpfDigits){
    if(!cpfDigits){ alert("CPF vazio."); return; }
    const url = `${WEBAPP_URL}?action=folder&cpf=${encodeURIComponent(cpfDigits)}`;
    window.open(url, "_blank");
  }

  async function gerar(){
    try{
      setStatus("Enviando...", true);

      const beneficio = valReq("beneficio","Tipo de benefício");
      const r = regra(beneficio);

      const payload = {
        token: TOKEN,

        clienteNome: valReq("clienteNome","Nome completo"),
        clienteCpf: onlyDigits(valReq("clienteCpf","CPF")),
        clienteRg: ($("clienteRg").value||"").trim(),
        clienteNacionalidade: valReq("clienteNacionalidade","Nacionalidade"),
        clienteProfissao: ($("clienteProfissao").value||"").trim(),
        clienteEstadoCivil: ($("clienteEstadoCivil").value||"").trim(),
        clienteEndereco: valReq("clienteEndereco","Endereço"),
        clienteUF: valReq("clienteUF","UF"),

        clienteTelefone: valReq("clienteTelefone","Telefone"),
        govSenha: valReq("govSenha","Senha GOV"),
        especialidadeMedica: ($("especialidadeMedica").value||"").trim(),
        doencaObservacao: ($("doencaObservacao").value||"").trim(),
        possuiLaudo: ($("possuiLaudo").value||"").trim(),
        tempoLaudo: ($("tempoLaudo").value||"").trim(),
        vaiPagarLaudo: ($("vaiPagarLaudo").value||"").trim(),
        qualidadeSegurado: ($("qualidadeSegurado").value||"").trim(),
        estaTrabalhando: ($("estaTrabalhando").value||"").trim(),

        beneficio,
        assinaturaARogo: ($("assinaturaARogo").value || "NÃO"),
        local: valReq("local","Local"),
        data: brDateFromISO(valReq("data","Data")),
      };

      // honorários
      if(r==="REGRA_1"){
        payload.percInicial = Number(valReq("percInicial","% inicial"));
        payload.numParcelasIniciais = Number(valReq("numParcelasIniciais","Nº parcelas iniciais"));
        payload.percProrrogacao = Number(valReq("percProrrogacao","% prorrogação"));
      } else if(r==="REGRA_3"){
        payload.percMaternidade = Number(valReq("percMaternidade","% maternidade"));
        payload.numParcelasMaternidade = Number(valReq("numParcelasMaternidade","Nº parcelas maternidade"));
      } else {
        payload.percRetroativo = Number(valReq("percRetroativo","% retroativo"));
        payload.numPrimeirasParcelasIntegrais = Number(valReq("numPrimeirasParcelasIntegrais","Nº parcelas integrais"));
        payload.parcelamentoAtivado = ($("parcelamentoAtivado").value === "true");
        if(payload.parcelamentoAtivado){
          payload.maxParcelasPagamento = Number(valReq("maxParcelasPagamento","Nº máximo parcelas"));
          payload.percMinimoParcela = Number(valReq("percMinimoParcela","% mínimo parcela"));
        }
      }

      await fetch(WEBAPP_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });

      setStatus("Enviado! Aguarde 10–20s e confira Drive + Planilha. Depois, use 'Abrir pasta'.", true);

    } catch(err){
      setStatus("Erro: " + (err.message || err), false);
    }
  }

  // JSONP buscar CPF
  function jsonp(url, cbName){
    return new Promise((resolve, reject)=>{
      const script = document.createElement("script");
      const timeout = setTimeout(()=>{
        script.remove();
        reject(new Error("Tempo esgotado na busca."));
      }, 12000);

      window[cbName] = (data)=>{
        clearTimeout(timeout);
        script.remove();
        delete window[cbName];
        resolve(data);
      };

      script.src = url;
      script.onerror = ()=>{
        clearTimeout(timeout);
        script.remove();
        delete window[cbName];
        reject(new Error("Falha ao buscar."));
      };
      document.body.appendChild(script);
    });
  }

  async function buscarCpf(){
    const cpf = onlyDigits(($("cpfBusca").value||"").trim());
    if(!cpf){ alert("Digite um CPF."); return; }

    $("resultadoBusca").style.display = "none";
    $("btnAbrirPastaBusca").style.display = "none";

    const cbName = "cb_" + Math.random().toString(36).slice(2);
    const url = `${WEBAPP_URL}?action=lookup&cpf=${encodeURIComponent(cpf)}&callback=${encodeURIComponent(cbName)}`;

    try{
      const r = await jsonp(url, cbName);

      $("resultadoBusca").style.display = "block";

      if(!r || !r.ok){
        $("resultadoBusca").innerHTML = "Erro: " + (r && r.error ? r.error : "desconhecido");
        return;
      }
      if(!r.found){
        $("resultadoBusca").innerHTML = "Cliente não encontrado na planilha para esse CPF.";
        $("btnAbrirPastaBusca").style.display = "block";
        $("btnAbrirPastaBusca").onclick = ()=> abrirPastaPorCpf(cpf);
        return;
      }

      const d = r.data || {};
      $("resultadoBusca").innerHTML = `
        <div><span class="k">Nome:</span> ${d.Nome||""}</div>
        <div><span class="k">CPF:</span> ${d.CPF||""}</div>
        <div><span class="k">Telefone:</span> ${d.Telefone||""}</div>
        <div><span class="k">UF:</span> ${d.UF||""}</div>
        <div><span class="k">Benefício:</span> ${d.Beneficio||""}</div>
      `;

      $("btnAbrirPastaBusca").style.display = "block";
      $("btnAbrirPastaBusca").onclick = ()=> abrirPastaPorCpf(cpf);

    } catch(err){
      $("resultadoBusca").style.display = "block";
      $("resultadoBusca").innerHTML = "Erro: " + (err.message || err);
    }
  }

  document.addEventListener("DOMContentLoaded", ()=>{
    $("data").value = todayISO();
    $("beneficio").addEventListener("change", renderHonorarios);
    $("btnGerar").addEventListener("click", (e)=>{ e.preventDefault(); gerar(); });
    $("btnAbrirPasta").addEventListener("click", ()=> abrirPastaPorCpf(onlyDigits(($("clienteCpf").value||"").trim())) );
    $("btnBuscar").addEventListener("click", buscarCpf);
  });
</script>
</body>
</html>
