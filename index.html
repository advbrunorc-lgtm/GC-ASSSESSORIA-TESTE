<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LP Assessoria Prev - Formulário</title>
  <style>
    body{font-family:system-ui,Arial;margin:16px;max-width:900px}
    .card{border:1px solid #ddd;border-radius:14px;padding:14px;margin:12px 0}
    label{display:block;font-weight:700;margin-top:10px}
    input,select,textarea{width:100%;padding:10px;margin-top:6px;border:1px solid #ccc;border-radius:12px;font-size:16px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:720px){.row{grid-template-columns:1fr}}
    button{padding:12px 14px;border:0;border-radius:12px;cursor:pointer;font-weight:800;background:#111827;color:#fff;margin-top:12px;width:100%}
    .muted{color:#555;font-size:14px}
    #status{margin-top:10px;font-weight:800}
  </style>
</head>
<body>
  <h1>LP Assessoria Prev</h1>
  <p class="muted">Gera <b>Contrato</b> e <b>Procuração</b> em PDF no Drive + registra na planilha.</p>

  <div class="card">
    <h2>Dados do Cliente</h2>

    <label>Nome completo *</label>
    <input id="clienteNome" autocomplete="name" required>

    <div class="row">
      <div>
        <label>CPF *</label>
        <input id="clienteCpf" inputmode="numeric" placeholder="Pode digitar com pontos/traço" required>
      </div>
      <div>
        <label>RG</label>
        <input id="clienteRg">
      </div>
    </div>

    <div class="row">
      <div>
        <label>Estado civil *</label>
        <input id="clienteEstadoCivil" required>
      </div>
      <div>
        <label>Profissão</label>
        <input id="clienteProfissao">
      </div>
    </div>

    <label>Endereço completo *</label>
    <textarea id="clienteEndereco" rows="3" required></textarea>
  </div>

  <div class="card">
    <h2>Contrato</h2>

    <label>Tipo de benefício *</label>
    <select id="beneficio" required>
      <option value="">Selecione...</option>
      <option>Benefício por incapacidade temporária</option>
      <option>Incapacidade permanente</option>
      <option>Aposentadoria</option>
      <option>Auxílio-acidente</option>
      <option>Pensão por morte</option>
      <option>BPC</option>
      <option>Salário-maternidade</option>
    </select>

    <div id="camposHonorarios"></div>

    <div class="row">
      <div>
        <label>Local *</label>
        <input id="local" value="Várzea Grande/MT" required>
      </div>
      <div>
        <label>Data *</label>
        <input id="data" type="date" required>
      </div>
    </div>

    <button id="btnGerar">GERAR PDFs E SALVAR NO DRIVE</button>
    <div id="status"></div>
  </div>

<script>
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbw1Vcx5RkUbU18HGsgn409YyUVpOFFc8V_F516KoR4a6_K1OUhqXTEpdT-WYeSRtTIB/exec";
  const TOKEN = "BRUNO-SEGURANCA-2026";

  function $(id){ return document.getElementById(id); }
  function onlyDigits(s){ return String(s||"").replace(/\D+/g,""); }
  function regra(b){
    b=(b||"").toLowerCase();
    if (b.includes("incapacidade tempor")) return "REGRA_1";
    if (b.includes("salário") || b.includes("matern")) return "REGRA_3";
    return "REGRA_2";
  }
  function todayISO(){
    const d=new Date(); const p=n=>String(n).padStart(2,"0");
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
  }
  function brDateFromISO(iso){
    const [y,m,d]=String(iso||"").split("-");
    return `${d}/${m}/${y}`;
  }
  function setStatus(msg, ok){
    const el=$("status");
    el.style.color = ok ? "#0a7b34" : "#b00020";
    el.textContent = msg;
  }
  function valReq(id, label){
    const v = ($(id).value || "").trim();
    if(!v) throw new Error("Preencha: " + label);
    return v;
  }

  function renderHonorarios(){
    const b = $("beneficio").value;
    const box = $("camposHonorarios");
    if(!b){ box.innerHTML=""; return; }

    const r = regra(b);
    if(r==="REGRA_1"){
      box.innerHTML = `
        <h3>Honorários (Regra 1)</h3>
        <div class="row">
          <div><label>% inicial *</label><input id="percInicial" type="number" value="30" required></div>
          <div><label>Nº parcelas iniciais *</label><input id="numParcelasIniciais" type="number" value="8" required></div>
        </div>
        <label>% prorrogação *</label>
        <input id="percProrrogacao" type="number" value="30" required>
        <p class="muted">Prorrogação: cobrança intercalada (padrão).</p>
      `;
      return;
    }

    if(r==="REGRA_3"){
      box.innerHTML = `
        <h3>Honorários (Regra 3)</h3>
        <div class="row">
          <div><label>% *</label><input id="percMaternidade" type="number" value="30" required></div>
          <div><label>Nº de parcelas *</label><input id="numParcelasMaternidade" type="number" value="4" required></div>
        </div>
      `;
      return;
    }

    box.innerHTML = `
      <h3>Honorários (Regra 2)</h3>
      <div class="row">
        <div><label>% sobre retroativo *</label><input id="percRetroativo" type="number" value="45" required></div>
        <div><label>Nº primeiras parcelas integrais *</label><input id="numPrimeirasParcelasIntegrais" type="number" value="6" required></div>
      </div>
      <label>Parcelamento?</label>
      <select id="parcelamentoAtivado">
        <option value="false" selected>Não</option>
        <option value="true">Sim</option>
      </select>
      <div id="parcelamentoBox"></div>
    `;
    $("parcelamentoAtivado").addEventListener("change", renderParcelamento);
    renderParcelamento();
  }

  function renderParcelamento(){
    const on = $("parcelamentoAtivado").value === "true";
    const box = $("parcelamentoBox");
    if(!on){ box.innerHTML=""; return; }
    box.innerHTML = `
      <div class="row">
        <div><label>Nº máximo de parcelas *</label><input id="maxParcelasPagamento" type="number" value="12" required></div>
        <div><label>% mínimo de cada parcela *</label><input id="percMinimoParcela" type="number" value="50" required></div>
      </div>
    `;
  }

  async function gerar(){
    try{
      setStatus("Enviando...", true);

      const beneficio = valReq("beneficio","Tipo de benefício");

      const payload = {
        token: TOKEN,
        clienteNome: valReq("clienteNome","Nome completo"),
        clienteCpf: onlyDigits(valReq("clienteCpf","CPF")),
        clienteRg: ($("clienteRg").value||"").trim(),
        clienteEstadoCivil: valReq("clienteEstadoCivil","Estado civil"),
        clienteProfissao: ($("clienteProfissao").value||"").trim(),
        clienteEndereco: valReq("clienteEndereco","Endereço completo"),
        beneficio,
        local: valReq("local","Local"),
        data: brDateFromISO(valReq("data","Data")),
      };

      const r = regra(beneficio);

      if(r==="REGRA_1"){
        payload.percInicial = Number(valReq("percInicial","% inicial"));
        payload.numParcelasIniciais = Number(valReq("numParcelasIniciais","Nº parcelas iniciais"));
        payload.percProrrogacao = Number(valReq("percProrrogacao","% prorrogação"));
        payload.modalidadeIntercalada = true;
      } else if(r==="REGRA_3"){
        payload.percMaternidade = Number(valReq("percMaternidade","% maternidade"));
        payload.numParcelasMaternidade = Number(valReq("numParcelasMaternidade","Nº parcelas maternidade"));
      } else {
        payload.percRetroativo = Number(valReq("percRetroativo","% retroativo"));
        payload.numPrimeirasParcelasIntegrais = Number(valReq("numPrimeirasParcelasIntegrais","Nº primeiras parcelas integrais"));
        payload.parcelamentoAtivado = $("parcelamentoAtivado").value === "true";
        if(payload.parcelamentoAtivado){
          payload.maxParcelasPagamento = Number(valReq("maxParcelasPagamento","Nº máximo de parcelas"));
          payload.percMinimoParcela = Number(valReq("percMinimoParcela","% mínimo por parcela"));
        }
      }

      await fetch(WEBAPP_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });

      setStatus("Enviado! Aguarde 10–20 segundos e confira a pasta do cliente no Drive e a planilha.", true);

    } catch(err){
      setStatus("Erro: " + (err.message || err), false);
    }
  }

  document.addEventListener("DOMContentLoaded", ()=>{
    $("data").value = todayISO();
    $("beneficio").addEventListener("change", renderHonorarios);
    $("btnGerar").addEventListener("click", (e)=>{ e.preventDefault(); gerar(); });
  });
</script>
</body>
</html>
